version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/vue-project"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 8
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "chore(deps)"
    groups:
      npm-general-updates:
        patterns:
          - "*"
        exclude-patterns:
          - "vite"
          - "@vitejs/*"
          - "vite-plugin-*"
          - "vue"
          - "@vue/*"
          - "vue-*"
        update-types:
          - "minor"
          - "patch"
      vite-stack:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vite-plugin-*"
        update-types:
          - "minor"
          - "patch"
      vue-stack:
        patterns:
          - "vue"
          - "@vue/*"
          - "vue-*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
    groups:
      github-actions:
        patterns:
          - "*"
